<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDFx - PDF Merge Tool</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#667eea,#764ba2,#6a11cb,#2575fc);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
padding:20px;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:100%;
max-width:700px;
}

.card{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.2);
padding:40px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
color:white;
}

.logo{
font-size:50px;
margin-bottom:10px;
}

h1{
font-size:32px;
margin-bottom:10px;
}

.subtitle{
opacity:.9;
margin-bottom:30px;
}

.upload-box{
border:2px dashed rgba(255,255,255,.5);
padding:30px;
border-radius:15px;
cursor:pointer;
transition:.3s;
margin-bottom:20px;
}

.upload-box:hover{
background:rgba(255,255,255,.1);
}

input[type="file"]{
margin-top:15px;
color:white;
}

.file-count{
margin-top:15px;
font-weight:600;
}

#fileList{
margin-top:20px;
list-style:none;
}

#fileList li{
background:rgba(255,255,255,.15);
padding:12px 15px;
margin-bottom:10px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.remove-btn{
background:#ff4d4d;
border:none;
color:white;
padding:5px 10px;
border-radius:8px;
cursor:pointer;
}

.merge-btn{
width:100%;
margin-top:25px;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:600;
cursor:pointer;
background:linear-gradient(45deg,#ff512f,#dd2476);
color:white;
transition:.3s;
}

.merge-btn:hover{
transform:translateY(-3px);
}

.footer{
margin-top:25px;
text-align:center;
font-size:14px;
opacity:.8;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div style="text-align:center">

<div class="logo">📄</div>

<h1>PDFx Merge Tool</h1>

<p class="subtitle">
Merge multiple PDF files into one document instantly.
Fast, Secure & Easy to Use.
</p>

</div>

<div class="upload-box">

<h3>📂 Upload PDF Files</h3>

<p>Select multiple PDF files to merge</p>

<input
type="file"
id="fileInput"
multiple
accept="application/pdf">

<div class="file-count" id="fileCount">
No files selected
</div>

</div>

<ul id="fileList"></ul>

<button class="merge-btn" onclick="submitFiles()">
 Merge & Download PDF
</button>

<div class="footer">
Built with ❤️ using Node.js & Express.js
</div>

</div>

</div>

<script>

let selectedFiles=[];

document.getElementById("fileInput")
.addEventListener("change",function(e){

selectedFiles=Array.from(e.target.files);

showFiles();

});

function showFiles(){

const list=document.getElementById("fileList");

const count=document.getElementById("fileCount");

list.innerHTML="";

count.innerHTML=
selectedFiles.length+" file(s) selected";

selectedFiles.forEach((file,index)=>{

const li=document.createElement("li");

li.innerHTML=`
<span>📄 ${file.name}</span>
<button class="remove-btn"
onclick="removeFile(${index})">
❌
</button>
`;

list.appendChild(li);

});

}

function removeFile(index){

selectedFiles.splice(index,1);

showFiles();

}

function submitFiles(){

if(selectedFiles.length===0){

alert("Please select PDF files");

return;

}

const formData=new FormData();

selectedFiles.forEach(file=>{

formData.append(
"pdfsFiles",
file,
file.name
);

});

fetch("/merge",{
method:"POST",
body:formData
})

.then(res=>res.arrayBuffer())

.then(data=>{

const blob=new Blob(
[data],
{
type:"application/pdf"
}
);

const url=
window.URL.createObjectURL(blob);

const a=
document.createElement("a");

a.href=url;

a.download="merged.pdf";

a.click();

})

.catch(err=>{

console.error(err);

alert("Error merging PDF");

});

}

</script>

</body>
</html>
